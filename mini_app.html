<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Игры</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #1a1a4e, #0d2137);
    background-size: 400% 400%;
    animation: bg-shift 10s ease infinite;
    color: var(--tg-theme-text-color, #ffffff);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }
  @keyframes bg-shift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  #bg-symbols {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0; overflow: hidden;
  }
  .bg-sym {
    position: absolute;
    font-size: 32px;
    opacity: 0;
    animation: float-up linear infinite;
    user-select: none;
  }
  @keyframes float-up {
    0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    8%   { opacity: 0.12; }
    92%  { opacity: 0.12; }
    100% { transform: translateY(-120px) rotate(360deg); opacity: 0; }
  }
  .tabs { position: sticky; top: 0; z-index: 10; backdrop-filter: blur(10px); }
  .page { position: relative; z-index: 1; }

  /* TABS */
  .tabs {
    display: flex;
    background: rgba(255,255,255,0.05);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    position: sticky; top: 0; z-index: 10;
  }
  .tab {
    flex: 1; padding: 14px; text-align: center;
    font-size: 15px; font-weight: 600; cursor: pointer;
    color: rgba(255,255,255,0.5);
    transition: all 0.2s; border-bottom: 3px solid transparent;
  }
  .tab.active { color: #fff; border-bottom-color: #6c63ff; }

  .page { display: none; padding: 20px; }
  .page.active { display: block; }

  /* ===== CASINO ===== */
  .casino-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 24px;
    padding-top: 20px;
  }
  .casino-title {
    font-size: 28px; font-weight: 800;
    background: linear-gradient(135deg, #f7971e, #ffd200);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
  }
  .machine {
    background: linear-gradient(145deg, #2d2d5e, #1a1a3e);
    border: 3px solid #6c63ff;
    border-radius: 24px;
    padding: 28px 32px;
    box-shadow: 0 0 40px rgba(108,99,255,0.4), inset 0 0 20px rgba(0,0,0,0.3);
    width: 100%; max-width: 360px;
  }
  .reels {
    display: flex; gap: 10px; justify-content: center;
    background: #0d0d1f;
    border-radius: 16px; padding: 16px;
    border: 2px solid rgba(108,99,255,0.3);
    margin-bottom: 20px;
    height: 100px; align-items: center;
    overflow: hidden;
  }
  .reel {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-size: 46px; height: 70px; overflow: hidden;
    position: relative; border-radius: 10px;
    background: rgba(255,255,255,0.03);
  }
  .reel-inner {
    display: flex; flex-direction: column;
    align-items: center; transition: transform 0s;
  }
  .reel-inner.spinning {
    animation: spin-reel 0.12s linear infinite;
  }
  @keyframes spin-reel {
    0% { transform: translateY(0); }
    100% { transform: translateY(-70px); }
  }
  .reel-sym { height: 70px; display: flex; align-items: center; justify-content: center; }

  .reel-overlay {
    position: absolute; left: 0; right: 0;
    height: 20px; pointer-events: none;
  }
  .reel-overlay.top { top: 0; background: linear-gradient(to bottom, #0d0d1f, transparent); }
  .reel-overlay.bot { bottom: 0; background: linear-gradient(to top, #0d0d1f, transparent); }

  .spin-btn {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, #6c63ff, #a855f7);
    border: none; border-radius: 14px;
    color: #fff; font-size: 18px; font-weight: 700;
    cursor: pointer; letter-spacing: 1px;
    box-shadow: 0 4px 20px rgba(108,99,255,0.5);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .spin-btn:active { transform: scale(0.97); box-shadow: 0 2px 10px rgba(108,99,255,0.3); }
  .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .casino-result {
    font-size: 20px; font-weight: 700; text-align: center;
    min-height: 32px; transition: all 0.3s;
  }
  .casino-result.win { color: #ffd200; }
  .casino-result.jackpot { color: #ff6b35; font-size: 24px; }
  .casino-result.lose { color: rgba(255,255,255,0.4); }

  .casino-stats {
    display: flex; gap: 16px; width: 100%; max-width: 360px;
  }
  .stat-card {
    flex: 1; background: rgba(255,255,255,0.05);
    border-radius: 14px; padding: 14px; text-align: center;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .stat-val { font-size: 22px; font-weight: 800; color: #6c63ff; }
  .stat-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }

  /* ===== TIC-TAC-TOE ===== */
  .ttt-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 20px;
    padding-top: 20px;
  }
  .ttt-title {
    font-size: 26px; font-weight: 800;
    background: linear-gradient(135deg, #43e97b, #38f9d7);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .ttt-mode {
    display: flex; gap: 10px;
  }
  .mode-btn {
    padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 600;
    border: 2px solid rgba(255,255,255,0.2); background: transparent;
    color: rgba(255,255,255,0.6); cursor: pointer; transition: all 0.2s;
  }
  .mode-btn.active {
    background: rgba(67,233,123,0.2); border-color: #43e97b; color: #43e97b;
  }
  .ttt-status {
    font-size: 16px; font-weight: 600; color: rgba(255,255,255,0.7);
    text-align: center; min-height: 24px;
  }
  .ttt-status .highlight { color: #43e97b; }

  .board {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 10px; width: 100%; max-width: 320px;
  }
  .cell {
    aspect-ratio: 1; background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 16px; display: flex; align-items: center; justify-content: center;
    font-size: 52px; cursor: pointer; transition: all 0.15s;
    position: relative; overflow: hidden;
  }
  .cell:hover:not(.taken) { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); }
  .cell.taken { cursor: default; }
  .cell.x-cell { border-color: rgba(108,99,255,0.5); }
  .cell.o-cell { border-color: rgba(67,233,123,0.5); }
  .cell.win-cell {
    background: rgba(255,214,0,0.15) !important;
    border-color: #ffd200 !important;
    animation: pulse-win 0.6s ease;
  }
  @keyframes pulse-win {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }
  .cell-appear {
    animation: pop-in 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes pop-in {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .ttt-scores {
    display: flex; gap: 12px; width: 100%; max-width: 320px;
  }
  .score-card {
    flex: 1; background: rgba(255,255,255,0.05);
    border-radius: 14px; padding: 12px; text-align: center;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .score-card.active-turn { border-color: #43e97b; background: rgba(67,233,123,0.07); }
  .score-name { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 4px; }
  .score-num { font-size: 26px; font-weight: 800; }
  .score-x { color: #6c63ff; }
  .score-o { color: #43e97b; }
  .score-draw { color: rgba(255,255,255,0.4); }

  .restart-btn {
    padding: 12px 32px; border-radius: 12px; font-size: 15px; font-weight: 700;
    background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.15);
    color: #fff; cursor: pointer; transition: all 0.2s;
  }
  .restart-btn:hover { background: rgba(255,255,255,0.15); }

  .search-btn {
    width: 100%; padding: 14px; border-radius: 14px; font-size: 16px; font-weight: 700;
    background: linear-gradient(135deg, #43e97b, #38f9d7);
    border: none; color: #1a1a2e; cursor: pointer; transition: transform 0.1s;
  }
  .search-btn:active { transform: scale(0.97); }
  .cancel-btn {
    padding: 10px 24px; border-radius: 10px; font-size: 14px; cursor: pointer;
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.6);
  }
  .leave-btn {
    padding: 10px 24px; border-radius: 10px; font-size: 14px; cursor: pointer;
    background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.3);
    color: #ff6060;
  }
  .searching-text {
    color: rgba(255,255,255,0.5); font-size: 15px; text-align: center; margin-bottom: 12px;
  }
  #online-lobby {
    flex-direction: column; align-items: center; gap: 14px;
    width: 100%; max-width: 320px;
  }

  /* CONFETTI */
  .confetti-wrap {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 999;
  }
  .confetti-piece {
    position: absolute; width: 10px; height: 10px; border-radius: 2px;
    animation: confetti-fall linear forwards;
  }
  @keyframes confetti-fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<div id="bg-symbols"></div>

<div class="tabs">
  <div class="tab active" onclick="showTab('casino')">🎰 Казино</div>
  <div class="tab" onclick="showTab('ttt')">❌ Крестики-нолики</div>
</div>

<!-- CASINO -->
<div class="page active" id="page-casino">
  <div class="casino-wrap">
    <div class="casino-title">🎰 КАЗИНО</div>

    <div class="casino-stats">
      <div class="stat-card">
        <div class="stat-val" id="stat-spins">0</div>
        <div class="stat-label">ПРОКРУТОК</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-wins">0</div>
        <div class="stat-label">ПОБЕД</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-jackpots">0</div>
        <div class="stat-label">ДЖЕКПОТОВ</div>
      </div>
    </div>

    <div class="machine">
      <div class="reels">
        <div class="reel" id="reel0">
          <div class="reel-overlay top"></div>
          <div class="reel-inner" id="ri0"><div class="reel-sym">🎰</div></div>
          <div class="reel-overlay bot"></div>
        </div>
        <div class="reel" id="reel1">
          <div class="reel-overlay top"></div>
          <div class="reel-inner" id="ri1"><div class="reel-sym">🎰</div></div>
          <div class="reel-overlay bot"></div>
        </div>
        <div class="reel" id="reel2">
          <div class="reel-overlay top"></div>
          <div class="reel-inner" id="ri2"><div class="reel-sym">🎰</div></div>
          <div class="reel-overlay bot"></div>
        </div>
      </div>
      <div class="casino-result" id="casino-result">Нажми КРУТИТЬ!</div>
      <br>
      <button class="spin-btn" id="spin-btn" onclick="doSpin()">🎰 КРУТИТЬ</button>
    </div>
  </div>
</div>

<!-- TIC-TAC-TOE -->
<div class="page" id="page-ttt">
  <div class="ttt-wrap">
    <div class="ttt-title">Крестики-нолики</div>

    <div class="ttt-mode">
      <button class="mode-btn active" id="mode-ai" onclick="setMode('ai')">🤖 Vs ИИ</button>
      <button class="mode-btn" id="mode-2p" onclick="setMode('2p')">👥 2 игрока</button>
      <button class="mode-btn" id="mode-ol" onclick="setMode('online')">🌐 Онлайн</button>
    </div>

    <div class="ttt-scores">
      <div class="score-card active-turn" id="sc-x">
        <div class="score-name">❌ Игрок</div>
        <div class="score-num score-x" id="score-x">0</div>
      </div>
      <div class="score-card" id="sc-draw">
        <div class="score-name">🤝 Ничья</div>
        <div class="score-num score-draw" id="score-draw">0</div>
      </div>
      <div class="score-card" id="sc-o">
        <div class="score-name" id="o-label">🤖 ИИ</div>
        <div class="score-num score-o" id="score-o">0</div>
      </div>
    </div>

    <div class="ttt-status" id="ttt-status">Ваш ход <span class="highlight">❌</span></div>

    <div class="board" id="board">
      <div class="cell" onclick="cellClick(0)"></div>
      <div class="cell" onclick="cellClick(1)"></div>
      <div class="cell" onclick="cellClick(2)"></div>
      <div class="cell" onclick="cellClick(3)"></div>
      <div class="cell" onclick="cellClick(4)"></div>
      <div class="cell" onclick="cellClick(5)"></div>
      <div class="cell" onclick="cellClick(6)"></div>
      <div class="cell" onclick="cellClick(7)"></div>
      <div class="cell" onclick="cellClick(8)"></div>
    </div>

    <div id="online-lobby" style="display:none">
      <div id="ol-idle">
        <button class="search-btn" onclick="startSearch()">🔍 Найти соперника</button>
      </div>
      <div id="ol-searching" style="display:none; text-align:center;">
        <p class="searching-text">🔍 Ищем соперника<span id="ol-dots"></span></p>
        <button class="cancel-btn" onclick="cancelSearch()">❌ Отменить</button>
      </div>
    </div>

    <button class="restart-btn" id="restart-btn" onclick="restartGame()">🔄 Новая игра</button>
    <button class="leave-btn" id="leave-btn" style="display:none" onclick="leaveOnlineGame()">🏳️ Покинуть игру</button>
  </div>
</div>

<div class="confetti-wrap" id="confetti"></div>

<script>
// ==================== TABS ====================
function showTab(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  event.target.classList.add('active');
}

// ==================== CASINO ====================
const SYMS = ['🍒','🍋','🍊','🍇','⭐','💎','7️⃣'];
let spins = 0, wins = 0, jackpots = 0;

function randSym() { return SYMS[Math.floor(Math.random() * SYMS.length)]; }

function setReelSym(idx, sym) {
  const ri = document.getElementById('ri' + idx);
  ri.innerHTML = `<div class="reel-sym">${sym}</div>`;
}

function spinReel(idx) {
  const ri = document.getElementById('ri' + idx);
  ri.classList.add('spinning');
  // Randomize symbol quickly during spin
  const iv = setInterval(() => { setReelSym(idx, randSym()); }, 120);
  return { interval: iv, reel: ri };
}

function stopReel(data, sym, delay) {
  return new Promise(res => {
    setTimeout(() => {
      clearInterval(data.interval);
      data.reel.classList.remove('spinning');
      setReelSym(data.reel.id.replace('ri',''), sym);
      res();
    }, delay);
  });
}

async function doSpin() {
  const btn = document.getElementById('spin-btn');
  const result = document.getElementById('casino-result');
  btn.disabled = true;
  result.className = 'casino-result';
  result.textContent = '🔄 Крутим...';
  spins++;
  document.getElementById('stat-spins').textContent = spins;

  // Pick result with weights
  const r = Math.random();
  let s = [randSym(), randSym(), randSym()];
  if (r < 0.15) { s[0] = s[1] = s[2] = randSym(); }           // 15% jackpot
  else if (r < 0.45) { s[1] = s[0] = randSym(); s[2] = randSym(); while(s[2]===s[0]) s[2]=randSym(); } // 30% two

  // Start all reels spinning
  const r0 = spinReel(0);
  const r1 = spinReel(1);
  const r2 = spinReel(2);

  // Stop one by one
  await new Promise(res => setTimeout(res, 800));
  clearInterval(r0.interval); r0.reel.classList.remove('spinning'); setReelSym(0, s[0]);
  await new Promise(res => setTimeout(res, 600));
  clearInterval(r1.interval); r1.reel.classList.remove('spinning'); setReelSym(1, s[1]);
  await new Promise(res => setTimeout(res, 600));
  clearInterval(r2.interval); r2.reel.classList.remove('spinning'); setReelSym(2, s[2]);

  // Evaluate
  if (s[0]===s[1] && s[1]===s[2]) {
    result.className = 'casino-result jackpot';
    result.textContent = '🏆 ДЖЕКПОТ! ВСЕ СОВПАЛИ!';
    jackpots++;
    document.getElementById('stat-jackpots').textContent = jackpots;
    spawnConfetti();
    if (window.Telegram?.WebApp) Telegram.WebApp.HapticFeedback.notificationOccurred('success');
  } else if (s[0]===s[1] || s[1]===s[2] || s[0]===s[2]) {
    result.className = 'casino-result win';
    result.textContent = '✨ Два совпали! Неплохо!';
    wins++;
    document.getElementById('stat-wins').textContent = wins;
    if (window.Telegram?.WebApp) Telegram.WebApp.HapticFeedback.impactOccurred('medium');
  } else {
    result.className = 'casino-result lose';
    result.textContent = '😔 Не повезло. Ещё разок?';
    if (window.Telegram?.WebApp) Telegram.WebApp.HapticFeedback.impactOccurred('light');
  }

  btn.disabled = false;
}

// ==================== TIC-TAC-TOE ====================
let board = Array(9).fill(null);
let currentPlayer = 'X';
let gameOver = false;
let mode = 'ai'; // 'ai' or '2p'
let scores = { X: 0, O: 0, draw: 0 };
const WIN_LINES = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

function setMode(m) {
  if (mode === 'online') olCleanup();
  mode = m;
  document.getElementById('mode-ai').classList.toggle('active', m==='ai');
  document.getElementById('mode-2p').classList.toggle('active', m==='2p');
  document.getElementById('mode-ol').classList.toggle('active', m==='online');
  document.getElementById('o-label').textContent = m==='ai' ? '🤖 ИИ' : m==='2p' ? '⭕ Игрок 2' : '⭕ Соперник';
  olSetState(m === 'online' ? 'idle' : null);
  restartGame();
}

function cellClick(idx) {
  if (gameOver || board[idx]) return;
  if (mode==='ai' && currentPlayer==='O') return;
  makeMove(idx, currentPlayer);
  if (mode==='ai' && !gameOver) {
    setTimeout(aiMove, 400);
  }
}

function makeMove(idx, player) {
  board[idx] = player;
  const cell = document.getElementById('board').children[idx];
  cell.textContent = player === 'X' ? '❌' : '⭕';
  cell.classList.add('taken', player === 'X' ? 'x-cell' : 'o-cell', 'cell-appear');
  if (window.Telegram?.WebApp) Telegram.WebApp.HapticFeedback.impactOccurred('light');

  const winner = checkWinner();
  if (winner) {
    endGame(winner);
  } else if (board.every(Boolean)) {
    endGame('draw');
  } else {
    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
    updateStatus();
  }
}

function checkWinner() {
  for (const [a,b,c] of WIN_LINES) {
    if (board[a] && board[a]===board[b] && board[b]===board[c]) return { player: board[a], line: [a,b,c] };
  }
  return null;
}

function endGame(result) {
  gameOver = true;
  if (result === 'draw') {
    scores.draw++;
    document.getElementById('ttt-status').innerHTML = '🤝 <span class="highlight">Ничья!</span>';
    document.getElementById('score-draw').textContent = scores.draw;
  } else {
    const { player, line } = result;
    scores[player]++;
    document.getElementById('score-' + player.toLowerCase()).textContent = scores[player];
    const name = player==='X' ? '❌ Игрок' : (mode==='ai' ? '🤖 ИИ' : '⭕ Игрок 2');
    document.getElementById('ttt-status').innerHTML = `🏆 Победа: <span class="highlight">${name}</span>`;
    line.forEach(i => document.getElementById('board').children[i].classList.add('win-cell'));
    if (player==='X') spawnConfetti();
    if (window.Telegram?.WebApp) Telegram.WebApp.HapticFeedback.notificationOccurred(player==='X'?'success':'error');
  }
  updateScoreHighlight();
}

function updateStatus() {
  const isX = currentPlayer === 'X';
  const name = isX ? '❌ Ваш ход' : (mode==='ai' ? '🤖 ИИ думает...' : '⭕ Ход Игрока 2');
  document.getElementById('ttt-status').innerHTML = `${name}`;
  updateScoreHighlight();
}

function updateScoreHighlight() {
  document.getElementById('sc-x').classList.toggle('active-turn', !gameOver && currentPlayer==='X');
  document.getElementById('sc-o').classList.toggle('active-turn', !gameOver && currentPlayer==='O');
}

function restartGame() {
  board = Array(9).fill(null);
  currentPlayer = 'X';
  gameOver = false;
  const cells = document.getElementById('board').children;
  for (const c of cells) {
    c.textContent = '';
    c.className = 'cell';
    c.onclick = function() { cellClick(Array.from(cells).indexOf(this)); };
  }
  // Re-set onclick properly
  Array.from(cells).forEach((c, i) => { c.onclick = () => cellClick(i); });
  document.getElementById('ttt-status').innerHTML = 'Ваш ход <span class="highlight">❌</span>';
  updateScoreHighlight();
}

// ===== MINIMAX AI =====
function aiMove() {
  if (gameOver) return;
  let best = -Infinity, move = -1;
  for (let i = 0; i < 9; i++) {
    if (!board[i]) {
      board[i] = 'O';
      const score = minimax(board, 0, false);
      board[i] = null;
      if (score > best) { best = score; move = i; }
    }
  }
  if (move !== -1) makeMove(move, 'O');
}

function minimax(b, depth, isMax) {
  const w = checkWinner();
  if (w) return w.player === 'O' ? 10 - depth : depth - 10;
  if (b.every(Boolean)) return 0;
  if (isMax) {
    let best = -Infinity;
    for (let i = 0; i < 9; i++) {
      if (!b[i]) { b[i]='O'; best=Math.max(best,minimax(b,depth+1,false)); b[i]=null; }
    }
    return best;
  } else {
    let best = Infinity;
    for (let i = 0; i < 9; i++) {
      if (!b[i]) { b[i]='X'; best=Math.min(best,minimax(b,depth+1,true)); b[i]=null; }
    }
    return best;
  }
}

// ===== CONFETTI =====
function spawnConfetti() {
  const wrap = document.getElementById('confetti');
  wrap.innerHTML = '';
  const colors = ['#ffd200','#ff6b35','#6c63ff','#43e97b','#f7971e','#ff4ecd'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left: ${Math.random()*100}%;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      width: ${6+Math.random()*8}px; height: ${6+Math.random()*8}px;
      animation-duration: ${1.5+Math.random()*1.5}s;
      animation-delay: ${Math.random()*0.5}s;
      border-radius: ${Math.random()>0.5?'50%':'2px'};
    `;
    wrap.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

// ==================== ONLINE MODE ====================
// Требует Firebase Realtime Database:
// 1. firebase.google.com → Создать проект → Realtime Database → Тестовый режим
// 2. Скопируй URL базы (вида https://ИМЯ-default-rtdb.firebaseio.com)
// 3. Вставь ниже вместо YOUR_FIREBASE_URL:
const FB_URL = 'https://game-57764-default-rtdb.firebaseio.com';

let myUid = null, myName = 'Игрок';
let olGameId = null, olSymbol = null, olGameData = null;
let olPollTimer = null, olDotsTimer = null;

function olInitUser() {
  const u = window.Telegram?.WebApp?.initDataUnsafe?.user;
  myUid = u ? String(u.id) : 'anon_' + Math.random().toString(36).slice(2, 9);
  myName = u?.first_name || 'Игрок';
}

async function fbReq(method, path, data) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (data !== undefined) opts.body = JSON.stringify(data);
  try {
    const r = await fetch(`${FB_URL}${path}.json`, opts);
    return r.ok ? r.json() : null;
  } catch { return null; }
}

function olSetState(state) {
  const isOnline = mode === 'online';
  // lobby UI
  document.getElementById('online-lobby').style.display = (isOnline && state !== 'ingame') ? 'flex' : 'none';
  document.getElementById('ol-idle').style.display = state === 'idle' ? 'block' : 'none';
  document.getElementById('ol-searching').style.display = state === 'searching' ? 'flex' : 'none';
  // board & buttons
  document.getElementById('board').style.display = (!isOnline || state === 'ingame') ? 'grid' : 'none';
  document.getElementById('restart-btn').style.display = !isOnline ? 'block' : 'none';
  document.getElementById('leave-btn').style.display = (isOnline && state === 'ingame') ? 'block' : 'none';
}

async function startSearch() {
  if (FB_URL.includes('YOUR_FIREBASE_URL')) {
    alert('Настройте Firebase: замените YOUR_FIREBASE_URL в коде mini_app.html'); return;
  }
  olInitUser();
  olSetState('searching');
  olStartDots();

  const lobby = await fbReq('GET', '/lobby') || {};
  const now = Date.now();
  let opp = null;
  for (const [uid, d] of Object.entries(lobby)) {
    if (uid !== myUid && now - (d.ts || 0) < 30000 && !d.gid) { opp = { uid, ...d }; break; }
  }

  if (opp) {
    const gid = opp.uid + '_' + myUid;
    olGameData = { board: Array(9).fill(null), turn: 'X', px: opp.uid, po: myUid, nx: opp.name || 'Игрок', no: myName, status: 'playing' };
    await fbReq('PUT', '/games/' + gid, olGameData);
    await fbReq('PUT', '/lobby/' + opp.uid + '/gid', gid);
    olJoinGame(gid, 'O');
  } else {
    await fbReq('PUT', '/lobby/' + myUid, { name: myName, ts: now });
    olPollTimer = setInterval(async () => {
      const entry = await fbReq('GET', '/lobby/' + myUid);
      if (entry?.gid) {
        clearInterval(olPollTimer);
        await fbReq('DELETE', '/lobby/' + myUid);
        olJoinGame(entry.gid, 'X');
      }
    }, 1500);
  }
}

function olJoinGame(gid, symbol) {
  olGameId = gid; olSymbol = symbol;
  olStopDots();
  olSetState('ingame');
  restartGame();
  olPollTimer = setInterval(async () => {
    const data = await fbReq('GET', '/games/' + olGameId);
    if (data) olSync(data);
    else olSetState('idle');
  }, 1500);
}

function olSync(data) {
  olGameData = data;
  board = data.board || Array(9).fill(null);
  currentPlayer = data.turn || 'X';
  gameOver = data.status !== 'playing';

  const cells = document.getElementById('board').children;
  Array.from(cells).forEach((cell, i) => {
    const v = board[i];
    cell.textContent = v === 'X' ? '❌' : v === 'O' ? '⭕' : '';
    cell.className = 'cell' + (v ? ` taken ${v==='X'?'x-cell':'o-cell'}` : '');
    cell.onclick = () => olCellClick(i);
  });

  const oppName = olSymbol === 'X' ? data.no : data.nx;

  if (data.status !== 'playing') {
    clearInterval(olPollTimer);
    if (!data.winner) {
      document.getElementById('ttt-status').innerHTML = '🤝 <span class="highlight">Ничья!</span>';
      scores.draw++; document.getElementById('score-draw').textContent = scores.draw;
    } else if (data.winner === olSymbol) {
      document.getElementById('ttt-status').innerHTML = '🏆 <span class="highlight">Ты победил!</span>';
      scores[olSymbol]++; document.getElementById('score-' + olSymbol.toLowerCase()).textContent = scores[olSymbol];
      spawnConfetti();
    } else {
      const oSym = olSymbol === 'X' ? 'O' : 'X';
      document.getElementById('ttt-status').innerHTML = `😔 Победил <span class="highlight">${oppName}</span>`;
      scores[oSym]++; document.getElementById('score-' + oSym.toLowerCase()).textContent = scores[oSym];
    }
    if (data.winLine) data.winLine.forEach(i => cells[i].classList.add('win-cell'));
    olSetState('ingame');
    return;
  }

  const myTurn = data.turn === olSymbol;
  document.getElementById('ttt-status').innerHTML = myTurn
    ? `Твой ход <span class="highlight">${olSymbol==='X'?'❌':'⭕'}</span>`
    : `⏳ Ход <span class="highlight">${oppName}</span>...`;
  updateScoreHighlight();
}

async function olCellClick(idx) {
  if (!olGameData || olGameData.status !== 'playing') return;
  if (board[idx] || currentPlayer !== olSymbol) return;
  if (window.Telegram?.WebApp) Telegram.WebApp.HapticFeedback.impactOccurred('light');

  const nb = [...board]; nb[idx] = olSymbol;
  let winner = null, winLine = null;
  for (const [a, b, c] of WIN_LINES) {
    if (nb[a] && nb[a]===nb[b] && nb[b]===nb[c]) { winner = nb[a]; winLine = [a,b,c]; break; }
  }
  const isDraw = !winner && nb.every(Boolean);
  const newData = { ...olGameData, board: nb, turn: olSymbol==='X'?'O':'X', status: (winner||isDraw)?'finished':'playing', winner: winner||null, winLine };
  await fbReq('PUT', '/games/' + olGameId, newData);
  olSync(newData);
}

async function cancelSearch() {
  clearInterval(olPollTimer); olPollTimer = null;
  olStopDots();
  if (myUid) await fbReq('DELETE', '/lobby/' + myUid);
  olSetState('idle');
}

async function leaveOnlineGame() {
  clearInterval(olPollTimer); olPollTimer = null;
  if (olGameId) { await fbReq('DELETE', '/games/' + olGameId).catch(()=>{}); olGameId = null; }
  olSymbol = null; olGameData = null;
  olSetState('idle');
  restartGame();
}

function olCleanup() {
  clearInterval(olPollTimer); olPollTimer = null;
  olStopDots();
  if (myUid) fbReq('DELETE', '/lobby/' + myUid).catch(()=>{});
}

function olStartDots() {
  let n = 0;
  const el = document.getElementById('ol-dots');
  olDotsTimer = setInterval(() => { if (el) el.textContent = '.'.repeat(n++ % 3 + 1); }, 500);
}
function olStopDots() { clearInterval(olDotsTimer); olDotsTimer = null; }

// ==================== ANIMATED BACKGROUND ====================
(function() {
  const wrap = document.getElementById('bg-symbols');
  const syms = ['🍒','🍋','🍊','🍇','⭐','💎','7️⃣','🎰','🃏','🎲'];
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'bg-sym';
    el.textContent = syms[Math.floor(Math.random() * syms.length)];
    const size = 22 + Math.random() * 28;
    el.style.cssText = `
      font-size: ${size}px;
      left: ${Math.random() * 100}%;
      animation-duration: ${10 + Math.random() * 14}s;
      animation-delay: ${-Math.random() * 16}s;
    `;
    wrap.appendChild(el);
  }
})();

// Init Telegram WebApp
if (window.Telegram?.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}
